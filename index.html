<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful Pause</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="content">
        <div id="sessions-view" class="page">
            <h1>Sessions</h1>
            <div class="timer-wrapper">
                <svg width="200" height="200" class="progress-ring">
                    <circle cx="100" cy="100" r="90" class="ring-bg" />
                    <circle id="progress-circle" cx="100" cy="100" r="90" class="ring-fill" />
                </svg>
                <div id="timer-display">00:00</div>
            </div>
            <div class="controls">
                <button onclick="startTimer(180)">3m</button>
                <button onclick="startTimer(300)">5m</button>
                <button onclick="startTimer(600)">10m</button>
                <button onclick="stopTimer()">Stop</button>
            </div>
            <p>Total Completed: <span id="session-count">0</span></p>
        </div>

        <div id="affirmations-view" class="page hidden affirmations-page">
            <h1 class="page-title">Affirmations</h1>
            <div class="affirmation-card">
                <p id="affirmation">"Breathe in, breathe out."</p>
            </div>
            <button class="next-btn" onclick="newAffirmation()">Next Affirmation</button>
        </div>

        <div id="calendar-view" class="page hidden">
            <h1>History</h1>
            <div class="mood-selectors">
                <button onclick="saveMood('Balanced')">☀️ Balanced</button>
                <button onclick="saveMood('Stressed')">🌩️ Stressed</button>
                <button onclick="saveMood('Tired')">🌙 Tired</button>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
            <button onclick="clearData()">Clear Data</button>
        </div>
    </div>

    <nav class="nav-bar">
        <button onclick="showPage('sessions-view')">Sessions</button>
        <button onclick="showPage('affirmations-view')">Affirmations</button>
        <button onclick="showPage('calendar-view')">History</button>
    </nav>
    <script src="main.js"></script>
</body>
</html>
